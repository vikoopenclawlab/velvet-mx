version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: velvet-mx-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: velvet_mx
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - velvet-network

  redis:
    image: redis:7-alpine
    container_name: velvet-mx-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - velvet-network

  app:
    build:
      context: .
      dockerfile: devops/docker/Dockerfile
    container_name: velvet-mx-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/velvet_mx?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - velvet-network

networks:
  velvet-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
