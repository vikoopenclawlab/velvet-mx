name: Deploy to Production

on:
  push:
    branches: [main]

env:
  DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
  NODE_ENV: production

jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - name: Build Docker image
        run: |
          docker build -t velvetmx/velvet-mx:${{ github.sha }} .
          docker tag velvetmx/velvet-mx:${{ github.sha }} velvetmx/velvet-mx:latest
      - name: Run Playwright tests
        run: |
          npm ci
          npx playwright install --with-deps
          npx playwright test
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
      - name: Push to registry
        if: success()
        run: |
          echo ${{ secrets.DOCKER_TOKEN }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker push velvetmx/velvet-mx:latest
      - name: Deploy to Production k8s
        if: success()
        run: |
          kubectl config use-context ${{ secrets.K8S_CONTEXT_PROD }}
          kubectl set image deployment/velvet-mx-app app=velvetmx/velvet-mx:latest -n velvet-mx
          kubectl rollout status deployment/velvet-mx-app -n velvet-mx
      - name: Notify failure
        if: failure()
        run: |
          curl -X POST ${{ secrets.SLACK_WEBHOOK }} -d '{"text": "Production deployment failed for Velvet MX"}'
