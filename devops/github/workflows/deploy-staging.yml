name: Deploy to Staging

on:
  push:
    branches: [develop]

env:
  NODE_ENV: production

jobs:
  deploy:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4

      - name: Configure kubectl
        run: |
          mkdir -p ~/.kube
          echo "$KUBECONFIG_CONFIG" | base64 -d > ~/.kube/config
        env:
          KUBECONFIG_CONFIG: ${{ secrets.KUBECONFIG_STAGING }}

      - name: Build and push Docker image
        run: |
          docker build -t velvetmx/velvet-mx:${{ github.sha }} .
          docker tag velvetmx/velvet-mx:${{ github.sha }} velvetmx/velvet-mx:staging
          echo ${{ secrets.DOCKER_TOKEN }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
          docker push velvetmx/velvet-mx:staging

      - name: Deploy to Kubernetes
        run: |
          kubectl set image deployment/velvet-mx-app app=velvetmx/velvet-mx:staging -n velvet-mx
          kubectl rollout status deployment/velvet-mx-app -n velvet-mx

      - name: Notify success
        run: |
          echo "Deployment to staging successful"