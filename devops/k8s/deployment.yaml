apiVersion: v1
kind: ConfigMap
metadata:
  name: velvet-mx-config
  namespace: velvet-mx
data:
  REDIS_URL: "redis://redis.velvet-mx.svc.cluster.local:6379"
  NEXTAUTH_URL: "https://velvetmx.staging.vikoapps.com"
  NODE_ENV: "production"
  NEXT_PUBLIC_APP_URL: "https://velvetmx.staging.vikoapps.com"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: velvet-mx-app
  namespace: velvet-mx
  labels:
    app.kubernetes.io/name: velvetmx
    app.kubernetes.io/component: app
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: velvetmx
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: velvetmx
        app.kubernetes.io/component: app
    spec:
      containers:
        - name: app
          image: docker.io/vikoopenclawlab/velvet-mx:staging
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          envFrom:
            - configMapRef:
                name: velvet-mx-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: velvet-mx-secrets
                  key: DATABASE_URL
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: velvet-mx-secrets
                  key: NEXTAUTH_SECRET
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: velvet-mx-secrets
                  key: STRIPE_SECRET_KEY
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: velvet-mx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: velvetmx
      app.kubernetes.io/component: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: velvetmx
        app.kubernetes.io/component: redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          ports:
            - containerPort: 6379
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 200m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: velvet-mx-app
  namespace: velvet-mx
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      name: http
  selector:
    app.kubernetes.io/name: velvetmx
    app.kubernetes.io/component: app
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: velvet-mx
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
  selector:
    app.kubernetes.io/name: velvetmx
    app.kubernetes.io/component: redis
