apiVersion: apps/v1
kind: Deployment
metadata:
  name: velvet-mx-app
  namespace: velvet-mx
  labels:
    app.kubernetes.io/name: velvetmx
    app.kubernetes.io/component: app
spec:
  replicas: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: velvetmx
      app.kubernetes.io/component: app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: velvetmx
        app.kubernetes.io/component: app
    spec:
      containers:
        - name: app
          image: velvetmx/velvet-mx:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: velvet-mx-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: velvet-mx-config
                  key: REDIS_URL
            - name: NEXTAUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: velvet-mx-config
                  key: NEXTAUTH_URL
            - name: NODE_ENV
              value: production
          livenessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /api/health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: velvet-mx-db
  namespace: velvet-mx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: velvetmx
      app.kubernetes.io/component: db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: velvetmx
        app.kubernetes.io/component: db
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: postgres
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: velvet-mx-secrets
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              value: velvet_mx
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: velvet-mx-pvc
